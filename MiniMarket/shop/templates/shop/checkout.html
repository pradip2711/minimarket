<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | Mini-Market</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #0c831f; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .summary { background: #e8f5e9; padding: 15px; border-radius: 8px; margin: 15px 0; text-align: center; }
        .confirm-btn { width: 100%; padding: 15px; background: #0c831f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Delivery Details</h2>
        <form action="/checkout/" method="POST">
            {% csrf_token %}
            <input type="text" name="full_name" placeholder="Full Name" required>
            <input type="tel" name="phone" placeholder="Mobile Number" required>
            <textarea name="address" placeholder="Flat / House No / Street Address" rows="3" required></textarea>
            
            <div class="summary">
                <p>Total to Pay: <span id="display-total" style="font-weight: 900; font-size: 1.2rem;">₹0</span></p>
                <small>Payment Mode: <b>Cash on Delivery</b></small>
            </div>

            <input type="hidden" name="total_price" id="hidden-total">
            
            <button type="submit" class="confirm-btn">Confirm Order</button>
        </form>
    </div>

    <script>
        // Get the total from the previous page
        const savedTotal = localStorage.getItem('market_total') || "0.00";
        document.getElementById('display-total').innerText = '₹' + savedTotal;
        document.getElementById('hidden-total').value = savedTotal;
    </script>
</body>
</html>
